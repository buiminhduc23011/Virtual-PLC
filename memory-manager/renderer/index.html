<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self';">
    <title>Virtual PLC Studio</title>
    <link rel="stylesheet" href="styles/main.css">
</head>

<body>
    <header class="titlebar">
        <div class="titlebar-drag">
            <div class="titlebar-mark">VP</div>
            <span class="titlebar-title">Virtual PLC Studio</span>
            <span class="titlebar-status" id="titlebar-status">Starting hub</span>
        </div>
        <div class="titlebar-controls">
            <button class="titlebar-btn" id="btn-minimize" title="Minimize" aria-label="Minimize">
                <svg class="icon" viewBox="0 0 24 24"><path d="M5 12h14" /></svg>
            </button>
            <button class="titlebar-btn" id="btn-maximize" title="Maximize" aria-label="Maximize">
                <svg class="icon" viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="1" /></svg>
            </button>
            <button class="titlebar-btn titlebar-btn-close" id="btn-close" title="Close" aria-label="Close">
                <svg class="icon" viewBox="0 0 24 24"><path d="M6 6l12 12M18 6L6 18" /></svg>
            </button>
        </div>
    </header>

    <div class="app-shell">
        <aside class="sidebar">
            <div class="sidebar-head">
                <div>
                    <div class="eyebrow">Virtual station</div>
                    <h1>PLC Simulator</h1>
                </div>
            </div>

            <div class="server-strip">
                <span class="status-dot" id="server-dot"></span>
                <span id="server-text">Hub offline</span>
                <button class="icon-button" id="btn-restart" title="Restart hub" aria-label="Restart hub">
                    <svg class="icon" viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-2.64-6.36" /><path d="M21 3v7h-7" /></svg>
                </button>
            </div>

            <div class="plc-picker">
                <label class="picker-label" for="plc-profile-select">PLC profile</label>
                <select class="plc-profile-select" id="plc-profile-select"></select>

                <div class="station-summary">
                    <div class="station-summary-line">
                        <span class="status-dot" id="station-dot"></span>
                        <strong class="station-name" id="station-name">No PLC active</strong>
                        <span class="quality-pill" id="station-status">Stopped</span>
                    </div>
                    <div class="station-kind" id="station-kind">--</div>
                    <div class="station-endpoint" id="station-endpoint">--</div>
                </div>
            </div>

            <div class="sidebar-inspector">
                <div class="inspector-section">
                    <div class="eyebrow">Profile</div>
                    <h3 id="inspector-profile">--</h3>
                    <div class="metric-row">
                        <span>Protocol</span>
                        <strong id="inspector-protocol">--</strong>
                    </div>
                    <div class="metric-row">
                        <span>Status</span>
                        <strong id="inspector-status">--</strong>
                    </div>
                    <div class="metric-row">
                        <span>Endpoint</span>
                        <strong id="inspector-endpoint">--</strong>
                    </div>
                </div>

                <div class="inspector-section">
                    <div class="section-line">
                        <span class="eyebrow">Examples</span>
                        <button class="mini-link" id="btn-seed-defaults">Seed</button>
                    </div>
                    <div class="example-list" id="example-list"></div>
                </div>

                <div class="inspector-section">
                    <div class="eyebrow">Actions</div>
                    <div class="action-stack">
                        <button class="button wide" id="btn-edit-plc">
                            <svg class="icon" viewBox="0 0 24 24"><path d="M12 20h9" /><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z" /></svg>
                            Edit PLC
                        </button>
                    </div>
                </div>
            </div>
        </aside>

        <main class="workspace">
            <section class="workspace-top">
                <div class="active-plc">
                    <div class="eyebrow">Active PLC</div>
                    <div class="active-row">
                        <h2 id="active-plc-name">No PLC</h2>
                        <span class="profile-pill" id="active-profile">Profile</span>
                    </div>
                    <div class="endpoint-line" id="active-endpoint">--</div>
                </div>
                <div class="toolbar">
                    <label class="toggle">
                        <input type="checkbox" id="auto-refresh" checked>
                        <span class="toggle-track"></span>
                        <span>Live</span>
                    </label>
                    <button class="button" id="btn-add-row">
                        <svg class="icon" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14" /></svg>
                        Row
                    </button>
                    <button class="button" id="btn-bulk-add">
                        <svg class="icon" viewBox="0 0 24 24"><path d="M4 7h16M4 12h16M4 17h16" /><path d="M8 5v14" /></svg>
                        Bulk
                    </button>
                    <button class="button primary" id="btn-refresh-now">
                        <svg class="icon" viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-2.64-6.36" /><path d="M21 3v7h-7" /></svg>
                        Read
                    </button>
                </div>
            </section>

            <section class="tabs">
                <button class="tab-button active" data-tab="registers">Registers</button>
                <button class="tab-button" data-tab="map">Memory Map</button>
                <button class="tab-button" data-tab="dbs">Data Blocks</button>
            </section>

            <section class="tab-panel active" id="tab-registers">
                <div class="table-frame">
                    <table class="watch-table">
                        <thead>
                            <tr>
                                <th class="col-tag">Tag</th>
                                <th class="col-address">Address</th>
                                <th class="col-type">Type</th>
                                <th class="col-value">Value</th>
                                <th class="col-quality">Quality</th>
                                <th class="col-time">Updated</th>
                                <th class="col-actions"></th>
                            </tr>
                        </thead>
                        <tbody id="watch-body"></tbody>
                    </table>
                </div>
            </section>

            <section class="tab-panel" id="tab-map">
                <div class="map-grid" id="memory-map"></div>
            </section>

            <section class="tab-panel" id="tab-dbs">
                <div class="db-toolbar">
                    <button class="button" id="btn-add-db">
                        <svg class="icon" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14" /></svg>
                        DB
                    </button>
                </div>
                <div class="table-frame compact">
                    <table class="watch-table">
                        <thead>
                            <tr>
                                <th>DB</th>
                                <th>Size</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody id="db-body"></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <div class="modal-overlay" id="modal-overlay">
        <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
            <div class="modal-header">
                <h3 id="modal-title">Modal</h3>
                <button class="icon-button" id="modal-close" title="Close" aria-label="Close">
                    <svg class="icon" viewBox="0 0 24 24"><path d="M6 6l12 12M18 6L6 18" /></svg>
                </button>
            </div>
            <div class="modal-body" id="modal-body"></div>
            <div class="modal-footer">
                <button class="button" id="modal-cancel">Cancel</button>
                <button class="button primary" id="modal-confirm">Confirm</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="scripts/app.js"></script>
</body>

</html>
