<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline';">
    <title>Memory Region Manager</title>
    <link rel="stylesheet" href="styles/main.css">
</head>

<body>
    <!-- Title Bar -->
    <div class="titlebar" id="titlebar">
        <div class="titlebar-drag">
            <div class="titlebar-icon"></div>
            <span class="titlebar-title">Memory Region Manager</span>
        </div>
        <div class="titlebar-controls">
            <button class="titlebar-btn" id="btn-minimize">
                <svg class="icon" viewBox="0 0 24 24">
                    <path d="M5 12h14" />
                </svg>
            </button>
            <button class="titlebar-btn" id="btn-maximize">
                <svg class="icon" viewBox="0 0 24 24">
                    <rect x="5" y="5" width="14" height="14" rx="1" />
                </svg>
            </button>
            <button class="titlebar-btn titlebar-btn-close" id="btn-close">
                <svg class="icon" viewBox="0 0 24 24">
                    <path d="M6 6l12 12M6 18L18 6" />
                </svg>
            </button>
        </div>
    </div>

    <!-- Main Container -->
    <div class="main-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-section">
                <div class="sidebar-label">PLC Connection</div>
                <div class="plc-selector">
                    <button class="plc-btn active" data-plc="PLC_1">
                        <span class="plc-indicator"></span>
                        PLC 1
                    </button>
                    <button class="plc-btn" data-plc="PLC_2">
                        <span class="plc-indicator"></span>
                        PLC 2
                    </button>
                </div>
            </div>

            <nav class="sidebar-nav">
                <button class="nav-item active" data-view="regions">
                    <span class="nav-icon">
                        <svg class="icon" viewBox="0 0 24 24">
                            <rect x="3" y="3" width="7" height="7" />
                            <rect x="14" y="3" width="7" height="7" />
                            <rect x="3" y="14" width="7" height="7" />
                            <rect x="14" y="14" width="7" height="7" />
                        </svg>
                    </span>
                    <span class="nav-text">Data Blocks</span>
                </button>
                <button class="nav-item" data-view="monitor">
                    <span class="nav-icon">
                        <svg class="icon" viewBox="0 0 24 24">
                            <path d="M3 3v18h18" />
                            <path d="M18 9l-5 5-4-4-3 3" />
                        </svg>
                    </span>
                    <span class="nav-text">Monitor</span>
                </button>
                <button class="nav-item" data-view="write">
                    <span class="nav-icon">
                        <svg class="icon" viewBox="0 0 24 24">
                            <path d="M12 20h9" />
                            <path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z" />
                        </svg>
                    </span>
                    <span class="nav-text">Write Values</span>
                </button>
                <button class="nav-item" data-view="settings">
                    <span class="nav-icon">
                        <svg class="icon" viewBox="0 0 24 24">
                            <circle cx="12" cy="12" r="3" />
                            <path
                                d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z" />
                        </svg>
                    </span>
                    <span class="nav-text">PLC Settings</span>
                </button>
            </nav>

            <div class="sidebar-footer">
                <div class="status-indicator">
                    <span class="status-dot online"></span>
                    <span>Virtual PLC Active</span>
                </div>
            </div>
        </aside>

        <!-- Content Area -->
        <main class="content">
            <!-- Data Blocks View -->
            <section class="view active" id="view-regions">
                <div class="view-header">
                    <h2>Data Blocks</h2>
                    <button class="btn btn-primary" id="btn-add-db">
                        <svg class="icon" viewBox="0 0 24 24">
                            <path d="M12 5v14M5 12h14" />
                        </svg>
                        Add DB
                    </button>
                </div>

                <div class="card">
                    <table class="data-table" id="db-table">
                        <thead>
                            <tr>
                                <th>DB Number</th>
                                <th>Size (bytes)</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="db-table-body">
                            <!-- Dynamic content -->
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- Monitor View -->
            <section class="view" id="view-monitor">
                <div class="view-header">
                    <h2>Value Monitor</h2>
                    <div class="monitor-controls">
                        <label class="toggle-label">
                            <input type="checkbox" id="auto-refresh" checked>
                            <span class="toggle-switch"></span>
                            <span>Auto Refresh</span>
                        </label>
                        <span class="refresh-indicator" id="refresh-indicator">Live</span>
                    </div>
                </div>

                <div class="monitor-add-bar">
                    <select id="monitor-db" class="input">
                        <!-- Dynamic options -->
                    </select>
                    <input type="number" id="monitor-offset" class="input" placeholder="Offset" value="0" min="0">
                    <select id="monitor-type" class="input">
                        <option value="BOOL">BOOL</option>
                        <option value="BYTE">BYTE</option>
                        <option value="WORD">WORD</option>
                        <option value="DWORD">DWORD</option>
                        <option value="INT" selected>INT</option>
                        <option value="DINT">DINT</option>
                        <option value="REAL">REAL</option>
                        <option value="STRING">STRING</option>
                    </select>
                    <input type="number" id="monitor-bit" class="input input-small" placeholder="Bit" value="0" min="0"
                        max="7">
                    <button class="btn btn-primary" id="btn-add-monitor">
                        <svg class="icon" viewBox="0 0 24 24">
                            <path d="M12 5v14M5 12h14" />
                        </svg>
                        Add
                    </button>
                </div>

                <div class="card monitor-grid" id="monitor-grid">
                    <!-- Dynamic monitor cards -->
                </div>
            </section>

            <!-- Write Values View -->
            <section class="view" id="view-write">
                <div class="view-header">
                    <h2>Write Values</h2>
                    <button class="btn btn-success" id="btn-write-all">
                        <svg class="icon" viewBox="0 0 24 24">
                            <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" />
                        </svg>
                        Write All
                    </button>
                </div>

                <div class="card">
                    <div class="write-form" id="write-form">
                        <div class="write-row header-row">
                            <div class="write-col">DB</div>
                            <div class="write-col">Offset</div>
                            <div class="write-col">Type</div>
                            <div class="write-col">Bit</div>
                            <div class="write-col">Value</div>
                            <div class="write-col">Action</div>
                        </div>
                        <div id="write-rows">
                            <!-- Dynamic rows -->
                        </div>
                        <button class="btn btn-ghost" id="btn-add-write-row">
                            <svg class="icon" viewBox="0 0 24 24">
                                <path d="M12 5v14M5 12h14" />
                            </svg>
                            Add Row
                        </button>
                    </div>
                </div>

                <div class="write-response" id="write-response"></div>
            </section>

            <!-- PLC Settings View -->
            <section class="view" id="view-settings">
                <div class="view-header">
                    <h2>PLC Settings</h2>
                    <button class="btn btn-primary" id="btn-add-plc">
                        <svg class="icon" viewBox="0 0 24 24">
                            <path d="M12 5v14M5 12h14" />
                        </svg>
                        Add PLC
                    </button>
                </div>

                <div class="card">
                    <table class="data-table" id="plc-table">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>IP Address</th>
                                <th>Port</th>
                                <th>Data Blocks</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="plc-table-body">
                            <!-- Dynamic content -->
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal" id="modal">
            <div class="modal-header">
                <h3 id="modal-title">Add Data Block</h3>
                <button class="modal-close" id="modal-close">
                    <svg class="icon" viewBox="0 0 24 24">
                        <path d="M6 6l12 12M6 18L18 6" />
                    </svg>
                </button>
            </div>
            <div class="modal-body" id="modal-body">
                <!-- Dynamic content -->
            </div>
            <div class="modal-footer">
                <button class="btn btn-ghost" id="modal-cancel">Cancel</button>
                <button class="btn btn-primary" id="modal-confirm">Confirm</button>
            </div>
        </div>
    </div>

    <script src="scripts/app.js"></script>
</body>

</html>
