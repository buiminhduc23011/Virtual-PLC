name: Build Windows Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Windows installer
    runs-on: windows-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python test dependencies
        run: python -m pip install flask flask-cors

      - name: Run Python tests
        run: python -m unittest discover -v

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        run: npm install --global pnpm@11.4.0

      - name: Install Electron dependencies
        run: pnpm --dir memory-manager install --frozen-lockfile

      - name: Build Windows installer
        run: pnpm --dir memory-manager exec electron-builder --win --publish never --config.win.signAndEditExecutable=false

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: virtual-plc-studio-windows-${{ github.ref_name }}
          path: |
            memory-manager/dist/*.exe
            memory-manager/dist/*.blockmap
            memory-manager/dist/*.yml
          if-no-files-found: error

      - name: Publish GitHub Release assets
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = $env:GITHUB_REF_NAME
          $assetPaths = Get-ChildItem -LiteralPath "memory-manager/dist" -File |
            Where-Object { $_.Name -match '\.(exe|blockmap|yml)$' } |
            ForEach-Object { $_.FullName }

          if (-not $assetPaths) {
            throw "No release assets found in memory-manager/dist"
          }

          gh release view $tag --repo $env:GITHUB_REPOSITORY *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag @assetPaths --repo $env:GITHUB_REPOSITORY --clobber
          } else {
            gh release create $tag @assetPaths --repo $env:GITHUB_REPOSITORY --title "Virtual PLC Studio $tag" --notes "Automated Windows build for $tag."
          }
